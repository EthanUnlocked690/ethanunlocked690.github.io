name: Fetch YouTube Videos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install -q yt-dlp

      - name: Fetch videos and write JSON
        run: |
          python3 - <<'EOF'
          import subprocess, json, os, sys

          CHANNEL = "https://www.youtube.com/@ethan1957-p2y"

          result = subprocess.run([
            "yt-dlp",
            "--flat-playlist",
            "--print", "%(id)s\t%(title)s\t%(upload_date)s\t%(url)s\t%(duration)s",
            "--no-warnings",
            "--playlist-end", "50",
            CHANNEL
          ], capture_output=True, text=True)

          if result.returncode != 0:
            print("yt-dlp error:", result.stderr, file=sys.stderr)
            sys.exit(1)

          videos = []
          for line in result.stdout.strip().splitlines():
            parts = line.split('\t')
            if len(parts) < 4:
              continue
            vid_id, title, upload_date, url, *rest = parts
            duration = int(rest[0]) if rest and rest[0].isdigit() else 9999
            is_short = duration <= 60 or '#short' in title.lower()
            try:
              from datetime import datetime
              published = datetime.strptime(upload_date, '%Y%m%d').isoformat() + '+00:00'
            except:
              published = upload_date
            videos.append({
              'id':        vid_id,
              'title':     title,
              'url':       f'https://www.youtube.com/watch?v={vid_id}',
              'thumbnail': f'https://i.ytimg.com/vi/{vid_id}/hqdefault.jpg',
              'published': published,
              'isShort':   is_short,
            })

          os.makedirs('json', exist_ok=True)
          with open('json/videos.json', 'w') as f:
            json.dump(videos, f, indent=2)

          print(f"Wrote {len(videos)} videos to json/videos.json")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/videos.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update videos.json [skip ci]"
            git push
          fi