name: Fetch YouTube Videos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch videos via Invidious API and write JSON
        run: |
          python3 - <<'EOF'
          import urllib.request, urllib.error, json, os, sys
          from datetime import datetime

          CHANNEL_ID = 'UC2cZN8VOCTVkelLsw3KlFHA'

          # Current public Invidious instances (from invidious.io, March 2026)
          INSTANCES = [
            'https://yewtu.be',
            'https://inv.tux.pizza',
            'https://invidious.private.coffee',
            'https://invidious.protokolla.fi',
            'https://iv.melmac.space',
            'https://yt.artemislena.eu',
            'https://invidious.flokinet.to',
            'https://inv.nadeko.net',
          ]

          def try_fetch(base):
            url = f'{base}/api/v1/channels/{CHANNEL_ID}/videos?fields=videoId,title,published,videoThumbnails,lengthSeconds'
            print(f'Trying {base}...')
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=15) as r:
              data = json.load(r)
            # Invidious returns either a list or {"videos": [...]}
            return data if isinstance(data, list) else data.get('videos', [])

          items = []
          for base in INSTANCES:
            try:
              items = try_fetch(base)
              if items:
                print(f'Got {len(items)} videos from {base}')
                break
            except Exception as e:
              print(f'  failed: {e}')

          if not items:
            print('All instances failed', file=sys.stderr)
            sys.exit(1)

          videos = []
          for v in items:
            vid_id   = v.get('videoId', '')
            title    = v.get('title', '')
            pub_ts   = v.get('published', 0)
            length   = v.get('lengthSeconds', 9999)
            is_short = length <= 60 or '#short' in title.lower()

            # Best available thumbnail
            thumbs = v.get('videoThumbnails', [])
            thumb  = next(
              (t['url'] for t in thumbs if t.get('quality') in ('high', 'medium')),
              f'https://i.ytimg.com/vi/{vid_id}/hqdefault.jpg'
            )
            # Invidious thumbnails are sometimes relative — make absolute
            if thumb.startswith('/'):
              thumb = f'https://i.ytimg.com/vi/{vid_id}/hqdefault.jpg'

            published = datetime.utcfromtimestamp(pub_ts).isoformat() + '+00:00' if pub_ts else ''

            videos.append({
              'id':        vid_id,
              'title':     title,
              'url':       f'https://www.youtube.com/watch?v={vid_id}',
              'thumbnail': thumb,
              'published': published,
              'isShort':   is_short,
            })

          os.makedirs('json', exist_ok=True)
          with open('json/videos.json', 'w') as f:
            json.dump(videos, f, indent=2)

          print(f'Wrote {len(videos)} videos to json/videos.json')
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/videos.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update videos.json [skip ci]"
            git push
          fi