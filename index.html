<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We've Moved</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:   #06060d;
      --gold: #f59e0b;
      --soft: #fde68a;
      --text: #eeedf8;
      --sub:  #8888b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Aurora */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); opacity: .25; pointer-events: none;
    }
    .orb-1 { width:600px;height:600px; background:radial-gradient(circle,rgba(245,158,11,.5) 0%,transparent 65%); top:-200px;left:-200px; animation:d1 18s ease-in-out infinite alternate; }
    .orb-2 { width:500px;height:500px; background:radial-gradient(circle,rgba(88,101,242,.4) 0%,transparent 65%); bottom:-150px;right:-150px; animation:d2 22s ease-in-out infinite alternate; }
    @keyframes d1 { to { transform: translate(60px,40px) scale(1.1); } }
    @keyframes d2 { to { transform: translate(-50px,-40px) scale(1.08); } }

    /* Card */
    .card {
      position: relative; z-index: 1;
      text-align: center;
      padding: 52px 44px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      max-width: 480px; width: 90%;
      animation: up .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes up {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .icon {
      font-size: 2.6rem; margin-bottom: 22px;
      animation: up .6s .1s cubic-bezier(.22,1,.36,1) both;
    }

    h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      line-height: 1.1; letter-spacing: -.03em;
      background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, var(--soft) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 14px;
      animation: up .7s .15s cubic-bezier(.22,1,.36,1) both;
    }

    p {
      font-size: .95rem; color: var(--sub);
      line-height: 1.65; margin-bottom: 32px;
      animation: up .6s .25s cubic-bezier(.22,1,.36,1) both;
    }

    .new-url {
      display: inline-block;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: .95rem; letter-spacing: .5px;
      color: var(--gold);
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.25);
      padding: 10px 20px; border-radius: 8px;
      margin-bottom: 28px;
      word-break: break-all;
      animation: up .6s .32s cubic-bezier(.22,1,.36,1) both;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Manrope', sans-serif; font-size: .9rem; font-weight: 600;
      background: var(--gold); color: #000;
      border: none; padding: 13px 28px; border-radius: 11px;
      text-decoration: none; cursor: pointer;
      transition: background .15s, transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
      animation: up .6s .4s cubic-bezier(.22,1,.36,1) both;
    }
    .btn:hover { background: #fbbf24; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,158,11,.35); }

    .countdown {
      margin-top: 20px;
      font-size: .75rem; color: rgba(136,136,176,.5);
      letter-spacing: 1px;
      animation: up .5s .5s cubic-bezier(.22,1,.36,1) both;
    }
    .countdown span { color: var(--sub); }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="icon">📦</div>
  <h1>We've moved</h1>
  <p>This URL is no longer active. TheUnlockedWeb has a new home — update your bookmarks!</p>
  <div class="new-url" id="newUrl">ethanunlocked690.github.io</div>
  <br>
  <a class="btn" href="https://theunlockedweb.github.io" id="goBtn">
    Go to new site →
  </a>
  <p class="countdown">Redirecting in <span id="secs">10</span>s</p>
</div>

<script>
  const NEW_URL = 'https://theunlockedweb.github.io';

  // Update display
  document.getElementById('newUrl').textContent = NEW_URL.replace('https://', '');
  document.getElementById('goBtn').href = NEW_URL;

  // Countdown + auto redirect
  let s = 10;
  const el = document.getElementById('secs');
  const t = setInterval(() => {
    el.textContent = --s;
    if (s <= 0) { clearInterval(t); window.location.replace(NEW_URL); }
  }, 1000);
</script>
</body>
</html>
