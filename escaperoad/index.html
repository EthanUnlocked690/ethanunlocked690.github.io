<!DOCTYPE html>
<html lang="en">
<script>
  window.firebase = {

      return this;

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity Game — TheUnlockedWeb</title>

  <link rel="stylesheet" href="../../style.css">

  <style>
    /* 🔥 FIXED ROOT LAYOUT */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Game shell ─────────────────────────── */
    .game-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh; /* FIXED */
      background: #000;
    }

    /* ── Canvas wrapper ─────────────────────── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06060d;
      min-height: 0; /* 🔥 IMPORTANT FIX */
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* ── Loading screen ─────────────────────── */
    #loading-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #06060d;
      z-index: 10;
      transition: opacity .4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Toolbar ────────────────────────────── */
    .toolbar {
      height: 44px;
      flex-shrink: 0;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }
  </style>
</head>

<body>

<div class="game-shell">

  <div class="canvas-wrap">

    <div id="loading-screen">
      <div>Loading...</div>
    </div>

    <canvas id="unity-canvas"></canvas>
  </div>

  <!-- Bottom toolbar (no gap now) -->
  <div class="toolbar">
    Toolbar
  </div>

</div>

<script src="2410211.loader.js"></script>

<script>
  const BUILD = '2410211';
  const canvas = document.getElementById('unity-canvas');
  const loading = document.getElementById('loading-screen');

  function setProgress(p) {
    // optional
  }

  function showError(msg) {
    console.error(msg);
  }

  async function loadAndMergeWasm() {
    try {
      const parts = [BUILD + '.wasm.unityweb.part1', BUILD + '.wasm.unityweb.part2'];

      const responses = await Promise.all(parts.map(url =>
        fetch(url).then(r => {
          if (!r.ok) throw new Error(`Failed to load ${url}`);
          return r.blob();
        })
      ));

      const combinedBlob = new Blob(responses, { type: 'application/wasm' });
      return URL.createObjectURL(combinedBlob);

    } catch (e) {
      showError(e.message);
    }
  }

  async function initGame() {
    const mergedWasmUrl = await loadAndMergeWasm();
    if (!mergedWasmUrl) return;

    createUnityInstance(canvas, {
      dataUrl: BUILD + '.data.unityweb',
      frameworkUrl: BUILD + '.framework.js.unityweb',
      codeUrl: mergedWasmUrl
    }).then(() => {
      loading.classList.add('hidden');
    }).catch(err => {
      showError(err);
    });
  }

  initGame();

  function resizeCanvas() {
    const wrap = canvas.parentElement;
    canvas.style.width = wrap.clientWidth + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
