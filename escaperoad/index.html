<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity Game — TheUnlockedWeb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../style.css">

  <style>
    body { overflow: hidden; }

    /* ── Game shell ─────────────────────────── */
    .game-shell {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      height: calc(100vh - var(--nav-h));
      background: #000;
    }

    /* ── Canvas wrapper ─────────────────────── */
    .canvas-wrap {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      background: #06060d;
    }

    #unity-canvas {
      display: block;
      width: 100%; height: 100%;
      background: #000;
    }

    /* ── Loading screen ─────────────────────── */
    #loading-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; background: #06060d;
      z-index: 10;
      transition: opacity .4s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loading-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: var(--gold-gl); color: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }

    .loading-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.4rem; color: var(--text);
    }

    /* Progress bar */
    .progress-track {
      width: 240px; height: 4px;
      background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-soft));
      border-radius: 2px;
      transition: width .2s ease;
    }

    .loading-pct {
      font-size: .75rem; font-weight: 600;
      color: var(--muted); letter-spacing: 1px;
    }

    /* Error screen */
    #error-screen {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; background: #06060d; z-index: 11;
      text-align: center; padding: 40px;
    }
    #error-screen i { font-size: 2.5rem; color: #f87171; }
    #error-screen h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }
    #error-screen p  { font-size: .82rem; color: var(--sub); max-width: 380px; line-height: 1.6; }

    /* ── Toolbar ────────────────────────────── */
    .toolbar {
      height: 44px; flex-shrink: 0;
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
    }

    .tb-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: .88rem; color: var(--sub); flex: 1;
    }

    .tb-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Manrope', sans-serif; font-size: .73rem; font-weight: 600;
      padding: 5px 11px; border-radius: 7px; cursor: pointer; border: 1px solid;
      transition: background .15s, transform .15s; background: none;
    }
    .tb-btn:hover { transform: translateY(-1px); }
    .tb-btn-fs { color: var(--gold); border-color: rgba(245,158,11,.25); }
    .tb-btn-fs:hover { background: var(--gold-gl); }
    .tb-btn-back { color: var(--sub); border-color: var(--border); }
    .tb-btn-back:hover { color: var(--text); border-color: var(--border-h); background: rgba(255,255,255,.04); }
  </style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div class="aurora" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Game shell -->
<div class="game-shell">

  <div class="canvas-wrap">
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loading-icon"><i class="fa-solid fa-gamepad"></i></div>
      <div class="loading-title" id="game-name">Loading game...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="loading-pct" id="loading-pct">0%</div>
    </div>

    <!-- Error screen -->
    <div id="error-screen">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <h2>Couldn't load game</h2>
      <p id="error-msg">An error occurred. Make sure all 4 game files are in the same folder as this page.</p>
    </div>

    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="tb-title" id="toolbar-title">Unity Game</span>
    <button class="tb-btn tb-btn-fs" id="btn-fullscreen">
      <i class="fa-solid fa-expand"></i> Fullscreen
    </button>
    <a href="../" class="tb-btn tb-btn-back">
      <i class="fa-solid fa-arrow-left"></i> Back to Games
    </a>
  </div>
</div>

<!--
  ── Unity build files ──────────────────────────────────────────
  Put these 4 files in the SAME folder as this index.html:
    2410211_loader.js
    2410211_data.unityweb
    2410211_framework_js.unityweb
    2410211_wasm.unityweb
  ──────────────────────────────────────────────────────────────
-->
<script src="2410211_loader.js"></script>
<script>
  const BUILD   = '2410211';
  const canvas  = document.getElementById('unity-canvas');
  const loading = document.getElementById('loading-screen');
  const errScr  = document.getElementById('error-screen');
  const errMsg  = document.getElementById('error-msg');
  const fill    = document.getElementById('progress-fill');
  const pct     = document.getElementById('loading-pct');

  function setProgress(p) {
    const v = Math.round(p * 100);
    fill.style.width = v + '%';
    pct.textContent  = v + '%';
  }

  function showError(msg) {
    loading.classList.add('hidden');
    errScr.style.display = 'flex';
    errMsg.textContent   = msg;
  }

  // Resize canvas to fill available space
  function resizeCanvas() {
    const wrap = canvas.parentElement;
    canvas.style.width  = wrap.clientWidth  + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Launch Unity
  createUnityInstance(canvas, {
    dataUrl:      BUILD + '_data.unityweb',
    frameworkUrl: BUILD + '_framework_js.unityweb',
    codeUrl:      BUILD + '_wasm.unityweb',
    streamingAssetsUrl: 'StreamingAssets',
    companyName:  'EthanUnlocked',
    productName:  'Unity Game',
    productVersion: '1.0',
    showBanner: (msg, type) => {
      if (type === 'error') showError(msg);
      else console.warn(msg);
    },
  }, (progress) => {
    setProgress(progress);
  }).then((instance) => {
    window.unityInstance = instance;
    loading.classList.add('hidden');

    // Update titles from Unity's product name if available
    const name = instance.Module?.productName || 'Unity Game';
    document.getElementById('game-name').textContent    = name;
    document.getElementById('toolbar-title').textContent = name;
    document.title = name + ' — TheUnlockedWeb';

  }).catch((err) => {
    showError(err || 'Failed to start the game. Check the browser console for details.');
  });

  // Fullscreen
  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (window.unityInstance) {
      window.unityInstance.SetFullscreen(1);
    } else if (canvas.requestFullscreen) {
      canvas.requestFullscreen();
    }
  });
</script>
</body>
</html>
