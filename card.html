<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ronin Chronicles | The Exile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --gold: #d4af37; --blood: #8b0000; --panel: rgba(15, 12, 10, 0.98); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Palatino', serif; color: var(--gold); user-select: none; }
        
        /* THE MAIN ESC MENU */
        #esc-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); pointer-events: auto;
        }
        .menu-frame {
            border: 3px double var(--gold); background: var(--panel);
            padding: 40px; width: 400px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .menu-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: transparent; border: 1px solid #5a4025; color: var(--gold);
            font-size: 1.2em; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .menu-btn:hover { background: var(--gold); color: #000; }

        /* HUD ELEMENTS */
        #hud { position: absolute; inset: 0; pointer-events: none; padding: 30px; }
        .hud-box { pointer-events: auto; background: var(--panel); border: 2px solid #5a4025; padding: 15px; position: absolute; }
        
        #top-left { top: 30px; left: 30px; border-left: 5px solid var(--gold); }
        #vitals { bottom: 30px; left: 30px; width: 300px; }
        #progress { bottom: 30px; right: 30px; text-align: right; }
        
        /* BARS */
        .bar-bg { width: 100%; height: 10px; background: #111; margin-top: 5px; border: 1px solid #333; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.3s; }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="esc-menu">
        <div class="menu-frame">
            <h1 style="letter-spacing: 5px; margin-bottom: 30px;">PAUSED</h1>
            <button class="menu-btn" onclick="toggleMenu()">Resume Pilgrimage</button>
            <button class="menu-btn">Character Customizer</button>
            <button class="menu-btn">World Map (Year View)</button>
            <button class="menu-btn" onclick="location.reload()">Save & Quit</button>
            <p style="font-size: 0.7em; color: #555; margin-top: 20px;">EXILE DAY: <span id="days-survived">1</span></p>
        </div>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        
        <div id="top-left" class="hud-box">
            <div id="w-icon" style="font-size: 1.5em;">🌧️</div>
            <div id="w-desc" style="text-transform: uppercase; font-size: 0.9em;">Rain (21.5°C)</div>
            <div id="clock" style="font-size: 0.8em; color: #888;">05:09:45 PM</div>
        </div>

        <div id="vitals" class="hud-box">
            <div class="stat">VITALITY<div class="bar-bg"><div id="hp-bar" class="bar-fill" style="background:var(--blood)"></div></div></div>
            <div class="stat" style="margin-top:10px">STAMINA<div class="bar-bg"><div id="st-bar" class="bar-fill" style="background:var(--gold)"></div></div></div>
            <div class="stat" style="margin-top:10px">NOURISHMENT<div class="bar-bg"><div id="nr-bar" class="bar-fill" style="background:#556b2f"></div></div></div>
        </div>

        <div id="progress" class="hud-box">
            <div style="font-size: 0.8em; color: #888;">DISTANCE TO ANCIENT VOLCANO</div>
            <div style="font-size: 2.2em; font-weight: bold;">4,999.00 MILES</div>
            <div class="bar-bg" style="height:4px;"><div style="width:0.1%; background:var(--gold); height:100%;"></div></div>
        </div>
    </div>

<script>
/** ENGINE START **/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 10000);
const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting - Dynamic Day/Night
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(50, 100, 50);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x404040, 0.5));

// Atmosphere
scene.fog = new THREE.FogExp2(0x111111, 0.002);

/** THE CHARACTER (REPLACING THE PILL) **/
const player = new THREE.Group();
const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.2, 4, 12), new THREE.MeshStandardMaterial({color: 0x222222}));
body.position.y = 1.1;
body.castShadow = true;
player.add(body);
scene.add(player);

/** THE LANDSCAPE (PROCEDURAL FOLIAGE) **/
const ground = new THREE.Mesh(new THREE.PlaneGeometry(20000, 20000), new THREE.MeshStandardMaterial({color: 0x151515}));
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Populate with 1000 trees to fix the "Void" look
const treeGeo = new THREE.ConeGeometry(1, 4, 6);
const treeMat = new THREE.MeshStandardMaterial({color: 0x1a241a});
for(let i=0; i<1000; i++){
    const tree = new THREE.Mesh(treeGeo, treeMat);
    tree.position.set(Math.random()*2000-1000, 2, Math.random()*2000-1000);
    tree.castShadow = true;
    scene.add(tree);
}

/** SYSTEM LOGIC **/
let isPaused = false;
const keys = {};

function toggleMenu() {
    isPaused = !isPaused;
    document.getElementById('esc-menu').style.display = isPaused ? 'flex' : 'none';
}

window.addEventListener('keydown', e => {
    if(e.key === 'Escape') toggleMenu();
    keys[e.key.toLowerCase()] = true;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

/** MAIN LOOP **/
function animate() {
    requestAnimationFrame(animate);
    if(isPaused) return;

    // Movement
    const speed = keys.shift ? 0.35 : 0.15;
    if(keys.w) player.translateZ(-speed);
    if(keys.s) player.translateZ(speed);
    if(keys.a) player.rotation.y += 0.03;
    if(keys.d) player.rotation.y -= 0.03;

    // Camera follow rig
    camera.position.set(player.position.x, 8, player.position.z + 15);
    camera.lookAt(player.position.x, 2, player.position.z);

    // Sync UI
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    
    renderer.render(scene, camera);
}

// Initial Sync
animate();
</script>
</body>
</html>
