<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ronin's Eternal Pilgrimage | Year-Long Survival</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --gold: #d4af37; --iron: #5a5a5a; --blood: #8b0000; --ink: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Times New Roman', serif; color: var(--gold); }
        
        /* THE INTERFACE */
        #hud { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }
        .panel { background: rgba(5, 5, 5, 0.9); border: 1px solid var(--iron); padding: 15px; pointer-events: auto; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        /* TOP HUD */
        #top-hud { display: flex; justify-content: space-between; align-items: flex-start; }
        .map-frame { width: 180px; height: 180px; border-radius: 50%; border: 3px double var(--gold); position: relative; overflow: hidden; }
        #compass-needle { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-weight: bold; color: var(--blood); font-size: 1.2em; }
        #map-canvas { background: #050505; width: 100%; height: 100%; }

        /* SURVIVAL STATS */
        .vitals { width: 250px; }
        .bar-container { width: 100%; height: 10px; background: #111; border: 1px solid var(--iron); margin: 5px 0; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        #hp-fill { background: var(--blood); width: 100%; }
        #stamina-fill { background: #daa520; width: 100%; }
        #hunger-fill { background: #556b2f; width: 100%; }

        /* WEATHER & TIME */
        .chronicle { font-variant: small-caps; letter-spacing: 2px; text-align: left; }
        #weather-icon { font-size: 2em; margin-bottom: 5px; }

        /* INTERACTION */
        #prompt { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); text-align: center; opacity: 0; transition: 1s; }
        .save-toast { position: absolute; bottom: 10px; right: 10px; font-size: 0.7em; color: #4CAF50; }

        /* LOADING */
        #overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: 2s; }
        .loader { width: 50px; height: 50px; border: 3px solid var(--iron); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="loader"></div>
        <h1 style="letter-spacing: 10px; margin-top: 20px;">EXILE</h1>
        <p id="load-status">Synchronizing with Real-World Time...</p>
    </div>

    <div id="hud">
        <div id="top-hud">
            <div class="panel chronicle">
                <div id="weather-icon">☀</div>
                <div id="weather-desc">Syncing Terrigal Weather...</div>
                <div id="real-time-clock">00:00:00</div>
                <div style="font-size: 0.8em; color: var(--iron); margin-top: 10px;">CYCLE: <span id="cycle-type">DAY</span></div>
            </div>

            <div class="map-frame">
                <div id="compass-needle">N</div>
                <canvas id="map-canvas"></canvas>
            </div>
        </div>

        <div id="prompt" class="panel">Press [E] to Rest at Campfire</div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div class="panel vitals">
                <label>VITALITY</label><div class="bar-container"><div id="hp-fill" class="bar-fill"></div></div>
                <label>STAMINA</label><div class="bar-container"><div id="stamina-fill" class="bar-fill"></div></div>
                <label>NOURISHMENT</label><div class="bar-container"><div id="hunger-fill" class="bar-fill"></div></div>
            </div>

            <div class="panel" style="text-align: right; width: 300px;">
                <div style="font-size: 0.7em; color: var(--iron);">DISTANCE TO ANCIENT VOLCANO</div>
                <div style="font-size: 1.5em;"><span id="dist-val">4,999.00</span> MILES</div>
                <div class="bar-container"><div id="year-progress" style="background: var(--gold); width: 0.1%;"></div></div>
            </div>
        </div>
    </div>

    <div id="save-toast" class="save-toast">PERSISTENCE SAVED</div>

<script>
/**
 * THE ETERNAL ENGINE (v3.0)
 * Designed for a 365-day persistence cycle.
 */

// --- 1. CORE DATA STRUCTURES ---
const CONFIG = {
    VOLCANO_POS: { x: 0, z: -5000000 }, // 5 million units (approx 1 year of walking)
    DAY_CYCLE_MS: 20 * 60 * 1000,
    WEATHER_SYNC_INTERVAL: 10 * 60 * 1000,
    SAVE_INTERVAL: 10000,
    WALK_SPEED: 0.4,
    RUN_SPEED: 0.9
};

let playerState = {
    x: 0, z: 0, rot: 0,
    hp: 100, stamina: 100, hunger: 100,
    lastLogin: Date.now(),
    startDate: Date.now(),
    bossHp: 1000000
};

// --- 2. PERSISTENCE LAYER ---
function loadGame() {
    const saved = localStorage.getItem('ronin_eternal_v3');
    if (saved) {
        playerState = JSON.parse(saved);
        // Hunger decay based on time away
        const hoursAway = (Date.now() - playerState.lastLogin) / (1000 * 60 * 60);
        playerState.hunger = Math.max(0, playerState.hunger - (hoursAway * 5));
    }
    playerState.lastLogin = Date.now();
}

function saveGame() {
    playerState.lastLogin = Date.now();
    localStorage.setItem('ronin_eternal_v3', JSON.stringify(playerState));
    const toast = document.getElementById('save-toast');
    toast.style.opacity = 1;
    setTimeout(() => toast.style.opacity = 0, 2000);
}

// --- 3. THE 3D ENVIRONMENT ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 10000);
const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Celestial SkyBox
const skyGeo = new THREE.SphereGeometry(8000, 32, 32);
const skyMat = new THREE.MeshBasicMaterial({ color: 0x000005, side: THREE.BackSide });
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

const sun = new THREE.DirectionalLight(0xffffff, 1.2);
const sunOrb = new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffee }));
scene.add(sun, sunOrb);

const moonOrb = new THREE.Mesh(new THREE.SphereGeometry(30, 32, 32), new THREE.MeshBasicMaterial({ color: 0xaaaaaa }));
scene.add(moonOrb);

// Ground System (Procedural Tiles)
const groundGroup = new THREE.Group();
scene.add(groundGroup);
const tileGeo = new THREE.PlaneGeometry(1000, 1000, 10, 10);
const tileMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 1 });

function buildTerrain() {
    for(let i = -2; i <= 2; i++) {
        for(let j = -2; j <= 2; j++) {
            const tile = new THREE.Mesh(tileGeo, tileMat);
            tile.rotation.x = -Math.PI/2;
            tile.position.set(i*1000, 0, j*1000);
            tile.receiveShadow = true;
            groundGroup.add(tile);
        }
    }
}

// Player Avatar
const ronin = new THREE.Group();
const rBody = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2, 4, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
rBody.position.y = 1;
rBody.castShadow = true;
ronin.add(rBody);
scene.add(ronin);

// --- 4. WEATHER & TIME API ---
async function fetchWeather() {
    try {
        const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-33.44&longitude=151.44&current=weather_code,temperature_2m');
        const data = await response.json();
        const code = data.current.weather_code;
        const temp = data.current.temperature_2m;
        
        let desc = "Clear";
        if (code >= 51) desc = "Rain";
        if (code >= 1 && code <= 3) desc = "Cloudy";
        
        document.getElementById('weather-desc').innerText = `${desc} (${temp}°C)`;
        document.getElementById('weather-icon').innerText = desc === "Rain" ? "🌧" : (desc === "Cloudy" ? "☁" : "☀");
        
        // Fog adjustment
        scene.fog = new THREE.FogExp2(desc === "Rain" ? 0x222222 : 0x000000, 0.005);
    } catch (e) { console.error("Weather Sync Failed"); }
}

// --- 5. THE GAME LOOP (LOGIC HUB) ---
const keys = {};
window.addEventListener('keydown', (e) => keys[e.code] = true);
window.addEventListener('keyup', (e) => keys[e.code] = false);

function updateCelestial() {
    const now = Date.now();
    const cyclePos = (now % (CONFIG.DAY_CYCLE_MS * 2)) / (CONFIG.DAY_CYCLE_MS * 2);
    const angle = cyclePos * Math.PI * 2;
    
    // Sun position
    sunOrb.position.set(Math.cos(angle) * 5000, Math.sin(angle) * 5000, -2000);
    sun.position.copy(sunOrb.position);
    
    // Moon position
    moonOrb.position.set(Math.cos(angle + Math.PI) * 5000, Math.sin(angle + Math.PI) * 5000, -2000);
    
    const isDay = Math.sin(angle) > 0;
    document.getElementById('cycle-type').innerText = isDay ? "DAY" : "NIGHTFALL";
    skyMat.color.setHex(isDay ? 0x050a1a : 0x000002);
}

function handleInput() {
    let currentSpeed = CONFIG.WALK_SPEED;
    
    // Running mechanics
    if (keys['ShiftLeft'] && playerState.stamina > 0) {
        currentSpeed = CONFIG.RUN_SPEED;
        playerState.stamina = Math.max(0, playerState.stamina - 0.2);
    } else {
        playerState.stamina = Math.min(100, playerState.stamina + 0.1);
    }

    if (keys['KeyW']) {
        ronin.position.z -= Math.cos(ronin.rotation.y) * currentSpeed;
        ronin.position.x -= Math.sin(ronin.rotation.y) * currentSpeed;
    }
    if (keys['KeyS']) {
        ronin.position.z += Math.cos(ronin.rotation.y) * currentSpeed;
        ronin.position.x += Math.sin(ronin.rotation.y) * currentSpeed;
    }
    if (keys['KeyA']) ronin.rotation.y += 0.03;
    if (keys['KeyD']) ronin.rotation.y -= 0.03;

    // Movement updates terrain tiles
    groundGroup.position.x = Math.floor(ronin.position.x / 1000) * 1000;
    groundGroup.position.z = Math.floor(ronin.position.z / 1000) * 1000;

    // Camera follow
    const camOffset = new THREE.Vector3(0, 5, 12).applyQuaternion(ronin.quaternion);
    camera.position.lerp(ronin.position.clone().add(camOffset), 0.1);
    camera.lookAt(ronin.position.clone().add(new THREE.Vector3(0, 2, 0)));
}

function updateHUD() {
    document.getElementById('hp-fill').style.width = playerState.hp + "%";
    document.getElementById('stamina-fill').style.width = playerState.stamina + "%";
    document.getElementById('hunger-fill').style.width = playerState.hunger + "%";
    
    const distToVolcano = Math.abs(ronin.position.z - CONFIG.VOLCANO_POS.z);
    const miles = (distToBoss / 100).toFixed(2);
    document.getElementById('dist-val').innerText = (distToVolcano / 5000).toFixed(2);
    
    // Map Canvas
    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,180,180);
    ctx.strokeStyle = "#d4af37";
    ctx.beginPath(); ctx.moveTo(90,90); ctx.lineTo(90, 70); ctx.stroke(); // North marker
}

function loop() {
    requestAnimationFrame(loop);
    
    handleInput();
    updateCelestial();
    updateHUD();
    
    renderer.render(scene, camera);
}

// --- 6. INITIALIZATION ---
loadGame();
buildTerrain();
fetchWeather();
setInterval(fetchWeather, CONFIG.WEATHER_SYNC_INTERVAL);
setInterval(saveGame, CONFIG.SAVE_INTERVAL);

// Clock
setInterval(() => {
    document.getElementById('real-time-clock').innerText = new Date().toLocaleTimeString();
}, 1000);

// Remove overlay after assets load
setTimeout(() => {
    document.getElementById('overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('overlay').style.display = 'none', 2000);
}, 3000);

loop();

</script>
</body>
</html>
