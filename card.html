<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ronin: The Eternal Exile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: rgba(10, 8, 5, 0.95); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Georgia', serif; color: var(--gold); }
        
        /* FULL MAIN MENU */
        #main-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .menu-card { border: 2px solid var(--gold); background: var(--bg); padding: 50px; width: 400px; text-align: center; box-shadow: 0 0 100px #000; }
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 15px 0; 
            background: #111; border: 1px solid var(--gold); color: var(--gold);
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn:hover { background: var(--gold); color: #000; }

        /* HUD ELEMENTS */
        #hud { position: absolute; inset: 0; pointer-events: none; padding: 25px; }
        
        /* TOP RIGHT: MAP & COMPASS */
        #nav-cluster { position: absolute; top: 20px; right: 20px; width: 180px; text-align: center; pointer-events: auto; }
        #map-frame { width: 180px; height: 180px; border: 2px solid var(--gold); border-radius: 50%; background: #050505; overflow: hidden; position: relative; }
        #compass-n { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-weight: bold; color: #8b0000; z-index: 10; }
        #map-canvas { width: 100%; height: 100%; }

        /* VITALS */
        #vitals { position: absolute; bottom: 30px; left: 30px; width: 300px; background: var(--bg); padding: 20px; border: 1px solid #444; }
        .bar-wrap { width: 100%; height: 10px; background: #111; margin: 10px 0; border: 1px solid #333; }
        .bar { height: 100%; width: 100%; transition: width 0.3s; }

        /* WEATHER/TIME */
        #info-panel { position: absolute; top: 20px; left: 20px; background: var(--bg); padding: 15px; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="menu-card">
            <h1 style="letter-spacing: 10px;">RONIN</h1>
            <p style="color: #666; font-size: 0.8em;">PAUSED</p>
            <button class="btn" onclick="toggleMenu()">Resume</button>
            <button class="btn" onclick="window.location.reload()">Save & Exit</button>
            <div style="margin-top: 20px; font-size: 0.7em;">YEAR PROGRESS: <span id="year-pc">0.01</span>%</div>
        </div>
    </div>

    <div id="hud">
        <div id="info-panel">
            <div id="w-icon">☀️</div>
            <div id="w-text">CLEAR SKIES</div>
            <div id="clock" style="font-size: 0.8em; color: #888; margin-top: 5px;">00:00:00</div>
        </div>

        <div id="nav-cluster">
            <div id="map-frame">
                <div id="compass-n">N</div>
                <canvas id="map-canvas" width="180" height="180"></canvas>
            </div>
        </div>

        <div id="vitals">
            VITALITY <div class="bar-wrap"><div id="hp-bar" class="bar" style="background:#8b0000"></div></div>
            STAMINA <div class="bar-wrap"><div id="st-bar" class="bar" style="background:var(--gold)"></div></div>
        </div>
    </div>

<script>
/** ENGINE & WORLD SETUP **/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 10000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Celestial Objects
const sun = new THREE.DirectionalLight(0xffffff, 1);
const sunOrb = new THREE.Mesh(new THREE.SphereGeometry(5), new THREE.MeshBasicMaterial({color: 0xffffff}));
const moonOrb = new THREE.Mesh(new THREE.SphereGeometry(4), new THREE.MeshBasicMaterial({color: 0xaaaaaa}));
scene.add(sun, sunOrb, moonOrb);

const starGeo = new THREE.BufferGeometry();
const starCoords = [];
for(let i=0; i<2000; i++) starCoords.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.7}));
scene.add(stars);

// Ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({color: 0x121212}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Player
const ronin = new THREE.Group();
const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x222}));
body.position.y = 1;
ronin.add(body);
scene.add(ronin);

/** WEATHER SYNC (TERRIGAL) **/
async function syncWeather() {
    try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-33.44&longitude=151.44&current=weather_code');
        const data = await res.json();
        const rain = data.current.weather_code >= 51;
        document.getElementById('w-text').innerText = rain ? "RAINY" : "CLEAR";
        document.getElementById('w-icon').innerText = rain ? "🌧️" : "☀️";
        scene.fog = new THREE.FogExp2(rain ? 0x222222 : 0x050505, 0.002);
    } catch(e) {}
}

/** INPUT SYSTEM (FIXED A/D INDEPENDENCE) **/
const keys = {};
let isPaused = false;
let stamina = 100;

window.addEventListener('keydown', e => { 
    if(e.key === 'Escape') toggleMenu();
    keys[e.key.toLowerCase()] = true; 
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function toggleMenu() {
    isPaused = !isPaused;
    document.getElementById('main-menu').style.display = isPaused ? 'flex' : 'none';
}

/** MINI-MAP **/
const mCtx = document.getElementById('map-canvas').getContext('2d');
function drawMap() {
    mCtx.fillStyle = "#050505";
    mCtx.fillRect(0,0,180,180);
    mCtx.strokeStyle = "#d4af37";
    mCtx.strokeRect(85, 85, 10, 10); // Player pos
}

/** MAIN LOOP **/
function animate() {
    requestAnimationFrame(animate);
    if(isPaused) return;

    // THE FIX: Independent Vector Calculation
    const wishDir = new THREE.Vector3(0, 0, 0);
    if(keys.w) wishDir.z -= 1;
    if(keys.s) wishDir.z += 1;
    if(keys.a) wishDir.x -= 1;
    if(keys.d) wishDir.x += 1;

    if(wishDir.length() > 0) {
        wishDir.normalize();
        const speed = (keys.shift && stamina > 0) ? 0.35 : 0.15;
        // Move relative to character facing
        const moveVector = wishDir.applyQuaternion(ronin.quaternion);
        ronin.position.add(moveVector.multiplyScalar(speed));
        if(keys.shift) stamina = Math.max(0, stamina - 0.2);
    } else {
        stamina = Math.min(100, stamina + 0.1);
    }

    // Camera Turn (Q/E) or Mouse
    if(keys.q) ronin.rotation.y += 0.04;
    if(keys.e) ronin.rotation.y -= 0.04;

    // Day/Night Cycle
    const time = Date.now() * 0.0001;
    sunOrb.position.set(Math.cos(time)*200, Math.sin(time)*200, -100);
    moonOrb.position.set(Math.cos(time+Math.PI)*200, Math.sin(time+Math.PI)*200, -100);
    sun.position.copy(sunOrb.position);
    stars.visible = Math.sin(time) < 0;

    // Camera Rig
    const camPos = new THREE.Vector3(0, 6, 12).applyQuaternion(ronin.quaternion);
    camera.position.lerp(ronin.position.clone().add(camPos), 0.1);
    camera.lookAt(ronin.position.x, 2, ronin.position.z);

    // UI Updates
    document.getElementById('st-bar').style.width = stamina + "%";
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    drawMap();

    renderer.render(scene, camera);
}

syncWeather();
animate();
</script>
</body>
</html>
