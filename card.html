<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiragana Boss Battle</title>
    <style>
        :root { --gold: #FFD700; --green: #006400; --red: #ff4d4d; --bg: #f0fdf4; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: var(--green); }
        #game-container { background: white; padding: 30px; border-radius: 20px; border: 6px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 400px; position: relative; }
        
        /* Health Bars */
        .health-container { width: 100%; height: 20px; background: #eee; border-radius: 10px; margin: 5px 0; overflow: hidden; border: 1px solid #ccc; }
        .health-bar { height: 100%; transition: width 0.3s ease; }
        #player-health { background: var(--green); width: 100%; }
        #boss-health { background: var(--gold); width: 100%; }
        
        #boss-area { display: none; margin-bottom: 20px; }
        #boss-sprite { font-size: 50px; margin-bottom: 10px; }
        
        #card { font-size: 80px; margin: 10px 0; font-weight: bold; height: 110px; display: flex; align-items: center; justify-content: center; }
        input { padding: 12px; font-size: 18px; border: 2px solid var(--green); border-radius: 8px; width: 60%; text-align: center; outline: none; }
        button { background: var(--green); color: var(--gold); border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        #feedback { margin-top: 10px; font-weight: bold; height: 20px; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <h1 id="title">Hiragana Training</h1>

    <div id="game-container">
        <div id="boss-area">
            <div id="boss-sprite">👹</div>
            <div style="font-size: 12px; font-weight: bold;">BOSS HP</div>
            <div class="health-container"><div id="boss-health" class="health-bar"></div></div>
            <div style="font-size: 12px; font-weight: bold;">YOUR HP</div>
            <div class="health-container"><div id="player-health" class="health-bar"></div></div>
        </div>

        <div id="card">---</div>
        <input type="text" id="answer-input" placeholder="?" autocomplete="off">
        <br>
        <button id="action-btn" onclick="handleInput()">Submit</button>
        <div id="feedback"></div>
    </div>

    <script>
        const library = [
            { jp: "か", ro: "ka" }, { jp: "き", ro: "ki" }, { jp: "く", ro: "ku" }, 
            { jp: "が", ro: "ga" }, { jp: "ぎ", ro: "gi" }, { jp: "ぐ", ro: "gu" },
            { jp: "さ", ro: "sa" }, { jp: "し", ro: "shi" }, { jp: "す", ro: "su" },
            { jp: "ざ", ro: "za" }, { jp: "じ", ro: "ji" }, { jp: "ず", ro: "zu" },
            { jp: "た", ro: "ta" }, { jp: "ち", ro: "chi" }, { jp: "つ", ro: "tsu" },
            { jp: "だ", ro: "da" }, { jp: "ば", ro: "ba" }, { jp: "び", ro: "bi" }
        ];

        let isBossMode = false;
        let currentCard = {};
        let questionCount = 0;
        let playerHP = 100;
        let bossHP = 100;

        function nextCard() {
            if (questionCount >= 5 && !isBossMode) {
                startBossFight();
            }
            currentCard = library[Math.floor(Math.random() * library.length)];
            document.getElementById('card').innerText = currentCard.jp;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
        }

        function startBossFight() {
            isBossMode = true;
            document.getElementById('title').innerText = "BOSS BATTLE!";
            document.getElementById('boss-area').style.display = "block";
            document.getElementById('game-container').style.borderColor = "var(--red)";
        }

        function handleInput() {
            const input = document.getElementById('answer-input').value.toLowerCase().trim();
            const feedback = document.getElementById('feedback');
            const container = document.getElementById('game-container');

            if (input === currentCard.ro) {
                feedback.innerText = "Nice Hit! ✨";
                feedback.style.color = "green";
                if (isBossMode) {
                    bossHP -= 20;
                    document.getElementById('boss-health').style.width = bossHP + "%";
                }
                questionCount++;
            } else {
                feedback.innerText = "Miss! ❌";
                feedback.style.color = "red";
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
                
                if (isBossMode) {
                    playerHP -= 25;
                    document.getElementById('player-health').style.width = playerHP + "%";
                }
            }

            if (bossHP <= 0) {
                document.getElementById('card').innerText = "🏆";
                feedback.innerText = "YOU WIN!";
                document.getElementById('answer-input').style.display = "none";
                return;
            }

            if (playerHP <= 0) {
                document.getElementById('card').innerText = "💀";
                feedback.innerText = "GAME OVER";
                document.getElementById('answer-input').style.display = "none";
                return;
            }

            setTimeout(nextCard, 600);
        }

        document.getElementById('answer-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleInput();
        });

        nextCard();
    </script>
</body>
</html>
